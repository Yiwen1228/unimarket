<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products | UNIMarket</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<nav class="navbar navbar-expand-lg topbar" aria-label="Customer navigation">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="../index.html"><span class="brand-mark">U</span>UNIMarket</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><span class="nav-link">User ID: <strong data-user-id></strong></span></li>
      <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
      <li class="nav-item"><a class="nav-link" href="my-orders.html">My Orders</a></li>
      <li class="nav-item"><button class="btn btn-link nav-link js-logout" type="button">Sign Out</button></li>
    </ul>
  </div>
</nav>

<main id="main" class="page-wrap container">
  <section class="panel mb-3" aria-labelledby="productsTitle">
    <div class="panel-head">
      <div>
        <h1 id="productsTitle" class="h5 mb-0">Browse and Search Products</h1>
        <p class="mb-0 text-muted small">Add items to basket and submit order.</p>
      </div>
      <div class="search-wrap">
        <i class="bi bi-search" aria-hidden="true"></i>
        <label for="productSearch" class="visually-hidden">Search products</label>
        <input id="productSearch" type="search" placeholder="Search by name or category">
      </div>
    </div>
    <div class="panel-body table-wrap">
      <table class="data-table" aria-label="Product table">
        <thead>
          <tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Qty</th><th>Action</th></tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel mb-2" aria-labelledby="basketTitle">
    <div class="panel-head"><h2 id="basketTitle" class="h6 mb-0">Order Basket</h2></div>
    <div class="panel-body">
      <ul id="cartList" class="mb-2"></ul>
      <p class="mb-2">Total: <strong id="cartTotal">GBP 0.00</strong></p>
      <button id="placeOrderBtn" type="button" class="btn-primary-app">Submit Order</button>
      <p class="inline-note mt-2 mb-0">Online payment is not available. Payment is handled offline.</p>
      <p id="feedback" class="feedback" aria-live="polite"></p>
    </div>
  </section>
</main>

<script src="../assets/js/app.js"></script>
</body>
</html>
