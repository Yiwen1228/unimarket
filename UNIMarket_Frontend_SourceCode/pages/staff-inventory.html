<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory Management | UNIMarket</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<nav class="navbar navbar-expand-lg topbar" aria-label="Staff navigation">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="../index.html"><span class="brand-mark">U</span>UNIMarket</a>
    <span class="navbar-text">Staff ID: <strong data-user-id></strong></span>
    <button class="btn btn-link nav-link js-logout" type="button">Sign Out</button>
  </div>
</nav>

<main id="main" class="page-wrap container">
  <div class="app-layout" id="inventoryArea">
    <aside class="side-nav" aria-label="Staff menu">
      <p>Staff menu</p>
      <a href="staff-dashboard.html">Dashboard</a>
      <a href="staff-orders.html">Order Processing</a>
      <a class="active" href="staff-inventory.html">Inventory Management</a>
    </aside>

    <section>
      <header class="panel mb-3">
        <div class="panel-head">
          <div>
            <h1 class="h5 mb-0">Inventory Management</h1>
            <p class="mb-0 text-muted small">Stock in/out and correction updates for product accuracy.</p>
          </div>
          <div class="search-wrap">
            <label for="inventorySearch" class="visually-hidden">Search inventory</label>
            <input id="inventorySearch" type="search" placeholder="Search product name">
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="panel-body table-wrap">
          <table class="data-table" aria-label="Inventory update table">
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Update Stock</th></tr></thead>
            <tbody id="inventoryBody"></tbody>
          </table>
          <p id="feedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>
    </section>
  </div>
</main>

<script src="../assets/js/app.js"></script>
</body>
</html>
