<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Processing | UNIMarket</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<nav class="navbar navbar-expand-lg topbar" aria-label="Staff navigation">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="../index.html"><span class="brand-mark">U</span>UNIMarket</a>
    <span class="navbar-text">Staff ID: <strong data-user-id></strong></span>
    <button class="btn btn-link nav-link js-logout" type="button">Sign Out</button>
  </div>
</nav>

<main id="main" class="page-wrap container">
  <div class="app-layout" id="staffOrdersArea">
    <aside class="side-nav" aria-label="Staff menu">
      <p>Staff menu</p>
      <a href="staff-dashboard.html">Dashboard</a>
      <a class="active" href="staff-orders.html">Order Processing</a>
      <a href="staff-inventory.html">Inventory Management</a>
    </aside>

    <section>
      <header class="panel mb-3">
        <div class="panel-head">
          <div>
            <h1 class="h5 mb-0">Order Processing</h1>
            <p class="mb-0 text-muted small">View and update statuses for all customer orders.</p>
          </div>
          <div class="filters" role="group" aria-label="Order status filter">
            <button type="button" class="filter-btn active" data-filter="all">All</button>
            <button type="button" class="filter-btn" data-filter="pending">Pending</button>
            <button type="button" class="filter-btn" data-filter="processing">Processing</button>
            <button type="button" class="filter-btn" data-filter="completed">Completed</button>
            <button type="button" class="filter-btn" data-filter="cancelled">Cancelled</button>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="panel-body table-wrap">
          <table class="data-table" aria-label="Staff order processing table">
            <thead><tr><th>Order ID</th><th>Customer ID</th><th>Items</th><th>Total</th><th>Status</th><th>Details</th><th>Set Status</th><th>Action</th></tr></thead>
            <tbody id="staffOrdersBody"></tbody>
          </table>
          <p id="feedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>
    </section>
  </div>
</main>

<script src="../assets/js/app.js"></script>
</body>
</html>
