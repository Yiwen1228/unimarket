{% extends 'market/base.html' %}
{% load static %}
{% block title %}My Orders - UofG UNIMarket{% endblock %}

{% block content %}
<h1 class="h2 mb-4">My Orders</h1>

<div id="orders-container" aria-live="polite">
    <p class="text-muted">Loading orders...</p>
</div>

<!-- Refund Request Modal -->
<div class="modal fade" id="refundModal" tabindex="-1" aria-labelledby="refundModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="refundModalLabel">Request Refund</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-2"><strong>Product:</strong> <span id="refund-product-name"></span></p>
                <div class="mb-3">
                    <label for="refund-qty" class="form-label">Quantity to refund</label>
                    <input type="number" id="refund-qty" class="form-control" min="1" value="1">
                </div>
                <div class="mb-3">
                    <label for="refund-reason" class="form-label">Reason</label>
                    <textarea id="refund-reason" class="form-control" rows="3" placeholder="Describe why you want a refund..."></textarea>
                </div>
                <input type="hidden" id="refund-item-id">
                <div id="refund-feedback" role="status" aria-live="polite"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="refund-submit-btn">Submit Refund Request</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'market/js/orders.js' %}"></script>
{% endblock %}
