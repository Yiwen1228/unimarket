{% extends 'market/base.html' %}
{% load static %}
{% block title %}Manage Orders - UofG UNIMarket{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0">Manage Orders</h1>
    <button id="export-orders-csv" class="btn btn-sm btn-outline-success export-csv-btn" aria-label="Export orders to CSV">
        <i class="bi bi-download" aria-hidden="true"></i> Export CSV
    </button>
</div>

<div class="table-responsive" aria-live="polite">
    <table class="table table-striped table-hover" id="orders-table" aria-label="Customer orders">
        <thead class="table-dark">
            <tr>
                <th scope="col">Order #</th>
                <th scope="col">Customer</th>
                <th scope="col">Items</th>
                <th scope="col">Total</th>
                <th scope="col">Time</th>
                <th scope="col">Status</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody id="orders-tbody">
            <tr><td colspan="7" class="text-center text-muted">Loading orders...</td></tr>
        </tbody>
    </table>
</div>
<div id="order-feedback" role="status" aria-live="polite"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'market/js/api.js' %}"></script>
<script src="{% static 'market/js/staff_orders.js' %}"></script>
{% endblock %}
