{% extends 'market/base.html' %}
{% block title %}Login - UofG UNIMarket{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">Customer Login</h1>
                <form method="POST" aria-label="Customer login form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control"
                               required autocomplete="email" aria-required="true">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                               required autocomplete="current-password" aria-required="true">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 text-center">
                    Don't have an account? <a href="{% url 'customer_register' %}">Register here</a>
                </p>
                <p class="text-center">
                    <a href="{% url 'staff_login' %}">Staff Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
