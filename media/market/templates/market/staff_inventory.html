{% extends 'market/base.html' %}
{% load static %}
{% block title %}Inventory - UofG UNIMarket{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0">Inventory Management</h1>
    <button id="export-inventory-csv" class="btn btn-sm btn-outline-success export-csv-btn" aria-label="Export inventory to CSV">
        <i class="bi bi-download" aria-hidden="true"></i> Export CSV
    </button>
</div>

<div class="table-responsive" aria-live="polite">
    <table class="table table-striped table-hover" id="inventory-table" aria-label="Product inventory">
        <thead class="table-dark">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Product</th>
                <th scope="col">Category</th>
                <th scope="col">Price</th>
                <th scope="col">Stock</th>
                <th scope="col">Adjust</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody id="inventory-tbody">
            <tr><td colspan="7" class="text-center text-muted">Loading inventory...</td></tr>
        </tbody>
    </table>
</div>
<div id="inventory-feedback" role="status" aria-live="polite"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'market/js/api.js' %}"></script>
<script src="{% static 'market/js/staff_inventory.js' %}"></script>
{% endblock %}
