{% extends 'market/base.html' %}
{% block title %}Forgot Password - UofG UNIMarket{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">Forgot Password</h1>
                <p class="text-muted text-center mb-4">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
                <form method="POST" aria-label="Forgot password form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control"
                               required autocomplete="email" aria-required="true">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <p class="mt-3 text-center">
                    <a href="{% url 'customer_login' %}">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
