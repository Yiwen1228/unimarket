{% extends 'market/base.html' %}
{% block title %}Reset Password - UofG UNIMarket{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">Reset Password</h1>
                <form method="POST" aria-label="Reset password form">
                    {% csrf_token %}
                    <input type="hidden" name="token" value="{{ token }}">
                    <div class="mb-3">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                               required autocomplete="new-password" aria-required="true"
                               minlength="8">
                        <small class="form-text text-muted">
                            At least 8 characters, with at least one letter and one digit.
                        </small>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password"
                               class="form-control" required autocomplete="new-password"
                               aria-required="true">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                </form>
                <p class="mt-3 text-center">
                    <a href="{% url 'customer_login' %}">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
