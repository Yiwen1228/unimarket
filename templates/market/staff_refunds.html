{% extends 'market/base.html' %}
{% load static %}
{% block title %}Refund Requests - UofG UNIMarket{% endblock %}

{% block content %}
<h1 class="h2 mb-4">Refund Requests</h1>

<div class="mb-3">
    <label for="refund-status-filter" class="form-label visually-hidden">Filter by status</label>
    <select id="refund-status-filter" class="form-select" style="max-width:200px" aria-label="Filter refund requests by status">
        <option value="">All</option>
        <option value="pending" selected>Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
    </select>
</div>

<div id="refunds-container" aria-live="polite">
    <p class="text-muted">Loading refund requests...</p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'market/js/api.js' %}"></script>
<script src="{% static 'market/js/staff_refunds.js' %}"></script>
{% endblock %}
